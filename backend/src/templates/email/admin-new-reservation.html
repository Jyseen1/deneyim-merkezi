<tr>
  <td style="padding:8px 32px 28px 32px;">

    <h1 style="margin:0 0 6px 0;font-family:'Inter',Arial,sans-serif;font-size:24px;font-weight:300;color:#FFFFFF;letter-spacing:-0.01em;line-height:1.2;">
      Yeni <span style="font-family:'Instrument Serif',Georgia,serif;font-style:italic;color:#C4B5FD;">basvuru</span>
    </h1>
    <p style="margin:0 0 22px 0;font-size:13px;color:#A1A1AA;line-height:1.5;">{{visitor_name}} bir rezervasyon talep etti.</p>

    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:rgba(124,58,237,0.06);border:1px solid rgba(124,58,237,0.20);border-radius:10px;margin-bottom:22px;">
      <tr><td style="padding:16px 18px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td style="padding:5px 0;font-size:10px;color:#71717A;text-transform:uppercase;letter-spacing:0.08em;font-family:'Space Grotesk',Arial,sans-serif;font-weight:600;width:110px;vertical-align:top;">Tarih</td>
            <td style="padding:5px 0;font-size:14px;color:#E4E4E7;font-family:'Inter',Arial,sans-serif;">{{visit_date}}</td>
          </tr>
          <tr>
            <td style="padding:5px 0;font-size:10px;color:#71717A;text-transform:uppercase;letter-spacing:0.08em;font-family:'Space Grotesk',Arial,sans-serif;font-weight:600;vertical-align:top;">Saat</td>
            <td style="padding:5px 0;font-size:14px;color:#E4E4E7;"><span style="font-family:'Space Grotesk',Arial,sans-serif;">{{start_time}}</span> &middot; {{duration}} dk</td>
          </tr>
          <tr>
            <td style="padding:5px 0;font-size:10px;color:#71717A;text-transform:uppercase;letter-spacing:0.08em;font-family:'Space Grotesk',Arial,sans-serif;font-weight:600;vertical-align:top;">Misafir</td>
            <td style="padding:5px 0;font-size:17px;color:#FFFFFF;font-family:'Instrument Serif',Georgia,serif;font-style:italic;">{{visitor_name}}</td>
          </tr>
          <tr>
            <td style="padding:5px 0;font-size:10px;color:#71717A;text-transform:uppercase;letter-spacing:0.08em;font-family:'Space Grotesk',Arial,sans-serif;font-weight:600;vertical-align:top;">Telefon</td>
            <td style="padding:5px 0;font-size:14px;color:#E4E4E7;">{{visitor_phone}}</td>
          </tr>
          <tr>
            <td style="padding:5px 0;font-size:10px;color:#71717A;text-transform:uppercase;letter-spacing:0.08em;font-family:'Space Grotesk',Arial,sans-serif;font-weight:600;vertical-align:top;">E-posta</td>
            <td style="padding:5px 0;font-size:14px;color:#E4E4E7;">{{visitor_email}}</td>
          </tr>
          <tr>
            <td style="padding:5px 0;font-size:10px;color:#71717A;text-transform:uppercase;letter-spacing:0.08em;font-family:'Space Grotesk',Arial,sans-serif;font-weight:600;vertical-align:top;">Kisi sayisi</td>
            <td style="padding:5px 0;font-size:14px;color:#E4E4E7;">{{group_size}} kisi</td>
          </tr>
          <tr>
            <td style="padding:5px 0;font-size:10px;color:#71717A;text-transform:uppercase;letter-spacing:0.08em;font-family:'Space Grotesk',Arial,sans-serif;font-weight:600;vertical-align:top;">Kanal</td>
            <td style="padding:5px 0;font-size:14px;color:#E4E4E7;text-transform:capitalize;">{{source}}</td>
          </tr>
          <tr>
            <td style="padding:5px 0;font-size:10px;color:#71717A;text-transform:uppercase;letter-spacing:0.08em;font-family:'Space Grotesk',Arial,sans-serif;font-weight:600;vertical-align:top;">Not</td>
            <td style="padding:5px 0;font-size:14px;color:#E4E4E7;line-height:1.5;">{{note}}</td>
          </tr>
        </table>
      </td></tr>
    </table>

    <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:6px 0 2px;">
      <tr>
        <td style="background-color:#7C3AED;border-radius:8px;">
          <a href="{{dashboard_url}}" style="display:inline-block;padding:11px 22px;font-family:'Space Grotesk',Arial,sans-serif;font-size:13px;font-weight:500;color:#FFFFFF;text-decoration:none;">Dashboard'da goruntule &rarr;</a>
        </td>
      </tr>
    </table>

  </td>
</tr>
