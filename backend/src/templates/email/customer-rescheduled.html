<tr>
  <td style="padding:8px 32px 28px 32px;">

    <h1 style="margin:0 0 6px 0;font-family:'Inter',Arial,sans-serif;font-size:24px;font-weight:300;color:#FFFFFF;letter-spacing:-0.01em;line-height:1.25;">
      Tarih <span style="font-family:'Instrument Serif',Georgia,serif;font-style:italic;color:#C4B5FD;">güncellendi</span>, {{visitor_name}}.
    </h1>
    <p style="margin:0 0 22px 0;font-size:13px;color:#A1A1AA;line-height:1.5;">Rezervasyon detayların güncellendi &mdash; yeni tarih aşağıda.</p>

    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:14px;">
      <tr>
        <td width="48%" style="padding:14px 16px;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.08);border-radius:10px;vertical-align:top;">
          <div style="font-family:'Space Grotesk',Arial,sans-serif;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:#71717A;margin-bottom:8px;">ESKİ</div>
          <div style="font-family:'Inter',Arial,sans-serif;font-size:13px;color:#A1A1AA;text-decoration:line-through;line-height:1.4;">{{old_date}}</div>
          <div style="font-family:'Space Grotesk',Arial,sans-serif;font-size:22px;color:#71717A;text-decoration:line-through;margin-top:6px;font-weight:300;letter-spacing:-0.01em;">{{old_time}}</div>
        </td>
        <td width="4%" style="font-size:0;line-height:0;">&nbsp;</td>
        <td width="48%" style="padding:14px 16px;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.30);border-radius:10px;vertical-align:top;">
          <div style="font-family:'Space Grotesk',Arial,sans-serif;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:#A78BFA;margin-bottom:8px;">YENİ</div>
          <div style="font-family:'Inter',Arial,sans-serif;font-size:13px;color:#FFFFFF;line-height:1.4;">{{new_date}}</div>
          <div style="font-family:'Space Grotesk',Arial,sans-serif;font-size:22px;color:#FFFFFF;margin-top:6px;font-weight:300;letter-spacing:-0.01em;">{{new_time}}</div>
        </td>
      </tr>
    </table>

    <p style="margin:14px 0 0 0;font-size:12px;color:#A1A1AA;line-height:1.6;">{{group_size}} kişi &middot; {{duration}} dakika</p>

  </td>
</tr>
