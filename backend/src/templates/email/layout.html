<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="x-apple-disable-message-reformatting" />
<meta name="color-scheme" content="dark" />
<meta name="supported-color-schemes" content="dark" />
<title>GigaX</title>
<!--[if mso]>
<style type="text/css">body, table, td, a { font-family: Arial, sans-serif !important; }</style>
<![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#0A0A0F;color:#E4E4E7;font-family:'Inter',-apple-system,'Segoe UI',Arial,sans-serif;">

<!-- Preheader (gizli önizleme metni) -->
<div style="display:none;max-height:0;overflow:hidden;opacity:0;font-size:1px;line-height:1px;color:#0A0A0F;">{{preheader}}</div>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0A0A0F;">
  <tr>
    <td align="center" style="padding:32px 16px;">

      <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;background-color:#16161D;border:1px solid rgba(124,58,237,0.30);border-radius:14px;overflow:hidden;">

        <!-- Top accent line -->
        <tr><td style="height:2px;background:linear-gradient(90deg,transparent,#7C3AED,transparent);line-height:2px;font-size:0;">&nbsp;</td></tr>

        <!-- Brand -->
        <tr>
          <td style="padding:28px 32px 4px 32px;">
            <div style="font-family:'Space Grotesk',Arial,sans-serif;font-size:22px;font-weight:600;color:#FFFFFF;letter-spacing:-0.01em;">Giga<span style="color:#A78BFA;">X</span></div>
          </td>
        </tr>

        <!-- Content slot -->
        {{!content}}

        <!-- Footer -->
        <tr>
          <td style="padding:18px 32px 26px 32px;border-top:1px solid rgba(255,255,255,0.06);">
            <div style="font-family:'Inter',Arial,sans-serif;font-size:11px;color:#71717A;line-height:1.6;">
              GigaX &middot; Bu mail otomatik olarak gönderilmiştir. Sorularınız için yanıtlayabilirsiniz.
            </div>
          </td>
        </tr>

      </table>

    </td>
  </tr>
</table>

</body>
</html>
