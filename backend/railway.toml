[build]
builder = "dockerfile"

[deploy]
# migrate deploy startCommand'DAN CIKARILDI. Sebep: cold Neon (serverless
# uyanma 10-15s) + Prisma engine init, migrate deploy'u yavaslatip 30sn
# healthcheck penceresini yiyordu; "node dist/server.js" ancak pencere
# dolduktan sonra basliyor, server "listening" demeden Railway container'i
# olduruyordu (failed deploy loglarinda migrate "No pending migrations"
# basarili ama server boot logu yok → Stopping Container).
#
# Artik server ANINDA boot eder → /health hizla 200 → healthcheck gecer.
# Migration'lar zaten uygulanmis durumda (8/8). YENI migration eklendiginde
# deploy ONCESI manuel calistir:  railway run npx prisma migrate deploy
# (veya Railway dashboard'da pre-deploy command olarak ayarla).
startCommand = "node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
